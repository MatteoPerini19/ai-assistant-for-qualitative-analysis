# Template file for task-specific prompt content.
# The Python script can use this file when the CSV does not contain
# `task_info` and `task_full_text`, or when those columns are empty.
# Lookup key: `task_id`.


tasks:
  task_01:
    task_info: "Participants were asked to reflect on a meaningful life event."
    task_full_text: "Please describe a life event that still feels meaningful to you today."

  task_02:
    task_info: "Participants were asked to compare a current reflection with an earlier response."
    task_full_text: "Read the current reflection in relation to the earlier reflection and evaluate whether it is deeper, more self-reflective, and more emotionally nuanced."

  task_03:
    task_info: "Participants responded orally to a reflection prompt."
    task_full_text: "Please speak for two minutes about a recent challenge and what you learned from it."
